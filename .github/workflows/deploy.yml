name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      command:
        description: 'Optional extra command after deploy'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/Projects/RustedPoly
            git pull origin main
            cargo build --release 2>&1 | tail -50
            systemctl daemon-reload
            systemctl restart bottie
            sleep 3
            systemctl status bottie 2>/dev/null | head -5 || pgrep -a bottie

      - name: Run extra command
        if: ${{ inputs.command != '' }}
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: EXTRA_CMD
          env:
            EXTRA_CMD: ${{ inputs.command }}
          script: |
            case "$EXTRA_CMD" in
              "status") systemctl status bottie ;;
              "logs") journalctl -u bottie -n 50 ;;
              "restart") systemctl restart bottie ;;
              *) echo "Unknown command: $EXTRA_CMD"; exit 1 ;;
            esac