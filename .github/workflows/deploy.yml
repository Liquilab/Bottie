name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Upload binary
          scp -i ~/.ssh/id_deploy target/release/bottie ${VPS_USER}@${VPS_HOST}:/opt/bottie/bottie-bin.new

          # Atomic swap + restart
          ssh -i ~/.ssh/id_deploy ${VPS_USER}@${VPS_HOST} << 'EOF'
            systemctl stop bottie
            cp /opt/bottie/bottie-bin /opt/bottie/bottie-bin.bak
            mv /opt/bottie/bottie-bin.new /opt/bottie/bottie-bin
            chmod +x /opt/bottie/bottie-bin
            systemctl start bottie
            sleep 3
            systemctl is-active bottie && echo "DEPLOY OK" || echo "DEPLOY FAILED"
            journalctl -u bottie -n 10 --no-pager
          EOF
