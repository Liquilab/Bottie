name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      command:
        description: 'Optional extra command after deploy'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/Projects/RustedPoly
            git pull origin main
            cargo build --release 2>&1 | tail -5
            systemctl restart bottie || (pkill -f bottie; sleep 1; nohup ./target/release/bottie &)
            sleep 3
            systemctl status bottie 2>/dev/null | head -5 || pgrep -a bottie

      - name: Run extra command
        if: ${{ inputs.command != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Projects/RustedPoly
            ${{ inputs.command }}
