name: Run command on VPS

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run on VPS'
        required: true
      working_dir:
        description: 'Working directory'
        required: false
        default: '/root/Projects/RustedPoly'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ inputs.working_dir }}
            echo "=== $(date -u) ==="
            echo "CMD: ${{ inputs.command }}"
            ${{ inputs.command }}
            echo "=== DONE ==="
