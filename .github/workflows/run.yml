name: Run command on VPS

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run on VPS'
        required: true
      working_dir:
        description: 'Working directory'
        required: false
        default: '/root/Projects/RustedPoly'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: WORKING_DIR,COMMAND
          env:
            WORKING_DIR: ${{ inputs.working_dir }}
            COMMAND: ${{ inputs.command }}
          script: |
            cd "$WORKING_DIR"
            echo "=== $(date -u) ==="
            echo "CMD: $COMMAND"
            eval "$COMMAND"
            echo "=== DONE ==="